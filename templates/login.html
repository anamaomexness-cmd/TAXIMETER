{% extends "base.html" %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>เข้าสู่ระบบ</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Taxi Meter Management System</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div style="background: #fff5f5; color: var(--danger); padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>อีเมล</label>
                <input type="email" name="email" class="form-control" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label>รหัสผ่าน</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                    <i class="fa fa-eye password-toggle" id="loginToggle" onclick="togglePassword('loginPassword', 'loginToggle')"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">เข้าสู่ระบบ</button>
        </form>
    </div>
</div>
{% endblock %}
